<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
audio { width: 100%; }
body{font: 12px Courier, Monospace;}
canvas{margin-right: 10px;}
table { border-spacing:0; border-collapse: collapse; }
</style>
</head>
<body bgcolor="silver" text="black" autocomplete="off">

<canvas id="crtCanvas" width="800" height="800"></canvas>
<b id="clicktostart" style="position: absolute; z-index: 1; left: 100px; top: 50px; width:200px; height:40px; font-size:18px; color: rgb(116, 187, 116);">[CLICK  TO START]</b>

<div style="width:360px; float:right;">
  <h2>Oscilloscope Controls</h2>
  <div>
    <label for="mainGain">Gain</label>
    <input id="mainGain" type="range" min="-1" max="4" value="0.0" step="0.05"
      oninput="controls.mainGain=mainGain.value; mainGainOutput.value=parseFloat(mainGain.value).toFixedMinus(2)+'\xA0'">
    <output id="mainGainOutput">+0.00</output>
  </div>
  <div>
    <label for="exposure">Intensity</label>
    <input id="exposure" type="range" min="-2" max="2" value="0.0" step="0.1"
      oninput="controls.exposureStops=this.value; exposureOutput.value=parseFloat(this.value).toFixedMinus(1)">
    <output id="exposureOutput">+0.0</output>
  </div>
  <div>
    <label for="hue">Hue</label>
    <input id="hue" type="range" min="0" max="359" value="125" step="1"
      oninput="controls.hue=this.value; hueOutput.value=this.value">
    <output id="hueOutput">125</output>
  </div>
  <div>
    <label for="persistence">Persistence</label>
    <input id="persistence" type="range" min="-1" max="1" value="0" step="0.01"
      oninput="controls.persistence=this.value; persistenceOutput.value=parseFloat(this.value).toFixedMinus(1)">
    <output id="persistenceOutput">0.00</output>
  </div>
  <div>
    <label for="micCheckbox">Microphone</label>
    <input type="checkbox" id="micCheckbox"
      onchange="if (this.checked) AudioSystem.tryToGetMicrophone(); else AudioSystem.disconnectMicrophone()">
    <output id="microphoneOutput"></output>
  </div>
</div>

<script src="oscilloscope.js"></script>
</body>
</html>
